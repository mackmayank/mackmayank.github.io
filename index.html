<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ExpenseFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ─── Design Tokens ─────────────────────────────────────────────── */
:root, [data-theme="light"] {
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);

  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
  --space-16: 4rem;

  --color-bg:             #f7f6f2;
  --color-surface:        #f9f8f5;
  --color-surface-2:      #fbfbf9;
  --color-surface-offset: #f3f0ec;
  --color-divider:        #dcd9d5;
  --color-border:         #d4d1ca;
  --color-text:           #28251d;
  --color-text-muted:     #7a7974;
  --color-text-faint:     #bab9b4;
  --color-primary:        #01696f;
  --color-primary-hover:  #0c4e54;
  --color-primary-highlight: #cedcd8;
  --color-success:        #437a22;
  --color-success-highlight: #d4dfcc;
  --color-error:          #a12c7b;
  --color-error-highlight: #e0ced7;
  --color-warning:        #964219;
  --color-warning-highlight: #ddcfc6;
  --color-orange:         #da7101;
  --color-gold:           #d19900;
  --color-blue:           #006494;
  --color-purple:         #7a39bb;
  --color-notification:   #a13544;

  --radius-sm: 0.375rem; --radius-md: 0.5rem;
  --radius-lg: 0.75rem;  --radius-xl: 1rem;
  --radius-full: 9999px;

  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);

  --font-display: 'Space Grotesk', 'Helvetica Neue', sans-serif;
  --font-body: 'Inter', 'Helvetica Neue', sans-serif;

  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);

  --sidebar-w: 240px;
  --header-h: 56px;
}

[data-theme="dark"] {
  --color-bg:             #171614;
  --color-surface:        #1c1b19;
  --color-surface-2:      #201f1d;
  --color-surface-offset: #1d1c1a;
  --color-divider:        #262523;
  --color-border:         #393836;
  --color-text:           #cdccca;
  --color-text-muted:     #797876;
  --color-text-faint:     #5a5957;
  --color-primary:        #4f98a3;
  --color-primary-hover:  #227f8b;
  --color-primary-highlight: #313b3b;
  --color-success:        #6daa45;
  --color-success-highlight: #3a4435;
  --color-error:          #d163a7;
  --color-error-highlight: #4c3d46;
  --color-warning:        #bb653b;
  --color-warning-highlight: #564942;
  --color-orange:         #fdab43;
  --color-gold:           #e8af34;
  --color-blue:           #5591c7;
  --color-purple:         #a86fdf;
  --color-notification:   #dd6974;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
}

/* ─── Base Reset ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  -webkit-text-size-adjust: none; text-size-adjust: none;
  -webkit-font-smoothing: antialiased;
  scroll-behavior: smooth;
  height: 100%;
}
body {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--color-text);
  background: var(--color-bg);
  min-height: 100dvh;
  overflow: hidden;
}
img, svg { display: block; }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
input, select, textarea { font: inherit; color: inherit; }
table { border-collapse: collapse; width: 100%; }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; border-radius: var(--radius-sm); }
::selection { background: oklch(from var(--color-primary) l c h / 0.2); }

/* ─── App Layout ────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--header-h) 1fr;
  height: 100dvh;
  transition: grid-template-columns var(--transition);
}
.app.sidebar-collapsed { grid-template-columns: 56px 1fr; }

/* ─── Sidebar ───────────────────────────────────────────────────── */
.sidebar {
  grid-row: 1 / -1;
  background: var(--color-surface);
  border-right: 1px solid var(--color-divider);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  overscroll-behavior: contain;
  z-index: 20;
  transition: width var(--transition);
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-4);
  height: var(--header-h);
  border-bottom: 1px solid var(--color-divider);
  overflow: hidden;
  flex-shrink: 0;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--color-primary);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: #fff;
}
.logo-text {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-text);
  white-space: nowrap;
  transition: opacity var(--transition), width var(--transition);
}
.app.sidebar-collapsed .logo-text { opacity: 0; width: 0; pointer-events: none; }

.sidebar-nav { flex: 1; padding: var(--space-3) var(--space-2); overflow-y: auto; }
.nav-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: var(--space-3) var(--space-2) var(--space-1);
  white-space: nowrap;
  overflow: hidden;
  transition: opacity var(--transition);
}
.app.sidebar-collapsed .nav-label { opacity: 0; }

.nav-item {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  color: var(--color-text-muted);
  text-decoration: none;
  font-size: var(--text-sm);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  min-height: 40px;
}
.nav-item:hover { background: var(--color-surface-offset); color: var(--color-text); }
.nav-item.active {
  background: var(--color-primary-highlight);
  color: var(--color-primary);
  font-weight: 600;
}
.nav-item svg { flex-shrink: 0; }
.nav-item-label { transition: opacity var(--transition), width var(--transition); }
.app.sidebar-collapsed .nav-item-label { opacity: 0; width: 0; }

/* ─── Header ────────────────────────────────────────────────────── */
.header {
  grid-column: 2;
  height: var(--header-h);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  display: flex; align-items: center;
  padding: 0 var(--space-6);
  gap: var(--space-4);
  position: sticky; top: 0; z-index: 10;
}
.sidebar-toggle {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  flex-shrink: 0;
  transition: background var(--transition), color var(--transition);
}
.sidebar-toggle:hover { background: var(--color-surface-offset); color: var(--color-text); }

.header-title {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--color-text);
  flex: 1;
}
.header-actions { display: flex; align-items: center; gap: var(--space-2); }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  transition: background var(--transition), color var(--transition);
}
.icon-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }

/* ─── Main Content ──────────────────────────────────────────────── */
.main {
  grid-column: 2;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: var(--space-6);
}
.page { display: none; }
.page.active { display: block; }

/* ─── Buttons ───────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: 500;
  line-height: 1;
  min-height: 36px;
  transition: background var(--transition), color var(--transition), box-shadow var(--transition);
  border: 1px solid transparent;
  white-space: nowrap;
}
.btn-primary {
  background: var(--color-primary);
  color: #fff;
  border-color: var(--color-primary);
}
.btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
.btn-secondary {
  background: var(--color-surface-offset);
  color: var(--color-text);
  border-color: var(--color-border);
}
.btn-secondary:hover { background: var(--color-divider); }
.btn-sm { padding: var(--space-1) var(--space-3); min-height: 28px; font-size: var(--text-xs); }
.btn-danger {
  background: var(--color-error-highlight);
  color: var(--color-error);
  border-color: oklch(from var(--color-error) l c h / 0.2);
}
.btn-danger:hover { background: var(--color-error); color: #fff; }

/* ─── Cards ─────────────────────────────────────────────────────── */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  box-shadow: var(--shadow-sm);
}
.card-title {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-3);
}

/* ─── KPI Cards ─────────────────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(200px, 100%), 1fr));
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}
.kpi-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  box-shadow: var(--shadow-sm);
}
.kpi-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-2);
}
.kpi-value {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--color-text);
  font-variant-numeric: tabular-nums lining-nums;
  line-height: 1.1;
}
.kpi-sub {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin-top: var(--space-1);
}
.kpi-delta {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: var(--text-xs);
  font-weight: 600;
  margin-top: var(--space-1);
}
.kpi-delta.up { color: var(--color-error); }
.kpi-delta.down { color: var(--color-success); }

/* ─── Charts Grid ───────────────────────────────────────────────── */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(380px, 100%), 1fr));
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}
.chart-container {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  box-shadow: var(--shadow-sm);
}
.chart-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--space-4);
  gap: var(--space-3);
  flex-wrap: wrap;
}
.chart-title {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--color-text);
}
.chart-canvas-wrap { position: relative; height: 220px; }

/* ─── Filters/Tabs ──────────────────────────────────────────────── */
.tab-bar {
  display: flex; gap: var(--space-1);
  background: var(--color-surface-offset);
  border-radius: var(--radius-lg);
  padding: var(--space-1);
  margin-bottom: var(--space-6);
  width: fit-content;
  max-width: 100%;
  overflow-x: auto;
}
.tab-btn {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-text-muted);
  transition: background var(--transition), color var(--transition);
  white-space: nowrap;
  min-height: 36px;
}
.tab-btn.active {
  background: var(--color-surface);
  color: var(--color-text);
  box-shadow: var(--shadow-sm);
}
.tab-btn:hover:not(.active) { color: var(--color-text); }

.filter-row {
  display: flex; align-items: center; gap: var(--space-3);
  margin-bottom: var(--space-5);
  flex-wrap: wrap;
}
.filter-select {
  padding: var(--space-2) var(--space-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  background: var(--color-surface);
  font-size: var(--text-sm);
  min-height: 36px;
  cursor: pointer;
  color: var(--color-text);
  transition: border-color var(--transition);
}
.filter-select:hover { border-color: var(--color-primary); }

/* ─── Table ─────────────────────────────────────────────────────── */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  box-shadow: var(--shadow-sm);
}
table thead tr {
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface-offset);
}
table th {
  padding: var(--space-3) var(--space-4);
  text-align: left;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
table th:first-child { border-radius: var(--radius-lg) 0 0 0; }
table th:last-child { border-radius: 0 var(--radius-lg) 0 0; }
table td {
  padding: var(--space-3) var(--space-4);
  font-size: var(--text-sm);
  border-bottom: 1px solid var(--color-divider);
  vertical-align: middle;
  font-variant-numeric: tabular-nums;
}
table tr:last-child td { border-bottom: none; }
table tbody tr {
  transition: background var(--transition);
}
table tbody tr:hover { background: var(--color-surface-offset); }
.table-empty {
  text-align: center;
  padding: var(--space-16) var(--space-8);
  color: var(--color-text-muted);
}
.table-empty svg { margin: 0 auto var(--space-3); opacity: 0.4; }
.table-empty p { font-size: var(--text-sm); }

/* ─── Category Badge ────────────────────────────────────────────── */
.cat-badge {
  display: inline-flex; align-items: center; gap: var(--space-1);
  padding: 2px var(--space-2);
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 500;
  white-space: nowrap;
}
.cat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ─── Add Expense Form ──────────────────────────────────────────── */
.quick-add-bar {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: var(--space-4) var(--space-5);
  box-shadow: var(--shadow-sm);
  margin-bottom: var(--space-6);
}
.quick-add-bar h2 {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: var(--space-4);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr auto auto auto;
  gap: var(--space-3);
  align-items: end;
}
.form-field { display: flex; flex-direction: column; gap: var(--space-1); }
.form-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.form-input {
  padding: var(--space-2) var(--space-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  background: var(--color-surface-2);
  font-size: var(--text-sm);
  min-height: 40px;
  color: var(--color-text);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.form-input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.12);
  outline: none;
}
.form-input::placeholder { color: var(--color-text-faint); }

/* ─── Category List ─────────────────────────────────────────────── */
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(160px, 100%), 1fr));
  gap: var(--space-3);
  margin-bottom: var(--space-6);
}
.cat-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column; gap: var(--space-2);
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
}
.cat-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); border-color: var(--color-primary); }
.cat-card.selected { border-color: var(--color-primary); background: var(--color-primary-highlight); }
.cat-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
}
.cat-name { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); }
.cat-amount { font-size: var(--text-xs); color: var(--color-text-muted); font-variant-numeric: tabular-nums; }

/* ─── Section Headers ───────────────────────────────────────────── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--space-4);
  gap: var(--space-3);
  flex-wrap: wrap;
}
.section-title {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--color-text);
}

/* ─── Mobile Bottom Nav ─────────────────────────────────────────── */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--color-surface);
  border-top: 1px solid var(--color-divider);
  padding: var(--space-2) var(--space-4);
  padding-bottom: max(var(--space-2), env(safe-area-inset-bottom));
  z-index: 30;
  gap: var(--space-1);
}
.mob-nav-item {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: var(--space-2) var(--space-1);
  border-radius: var(--radius-md);
  color: var(--color-text-muted);
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  transition: color var(--transition), background var(--transition);
  min-height: 44px; min-width: 44px;
  justify-content: center;
}
.mob-nav-item.active { color: var(--color-primary); }
.mob-nav-item:active { background: var(--color-surface-offset); }

/* ─── Modal ─────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: oklch(0.1 0 0 / 0.5);
  backdrop-filter: blur(4px);
  z-index: 50;
  display: flex; align-items: center; justify-content: center;
  padding: var(--space-4);
  opacity: 0; pointer-events: none;
  transition: opacity var(--transition);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: var(--space-6);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 480px;
  transform: translateY(8px);
  transition: transform var(--transition);
  max-height: 90dvh;
  overflow-y: auto;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--space-5);
}
.modal-title {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 700;
  color: var(--color-text);
}
.modal-form { display: flex; flex-direction: column; gap: var(--space-4); }
.modal-form .form-field { gap: var(--space-2); }
.cat-picker {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: var(--space-2);
}
.cat-pick-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: var(--space-2);
  border-radius: var(--radius-md);
  border: 1.5px solid var(--color-border);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
  font-size: var(--text-xs);
  text-align: center;
  min-height: 44px;
}
.cat-pick-item:hover { border-color: var(--color-primary); }
.cat-pick-item.selected {
  border-color: var(--color-primary);
  background: var(--color-primary-highlight);
  color: var(--color-primary);
  font-weight: 600;
}

/* ─── Toast ─────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: calc(var(--space-6) + 60px); right: var(--space-6);
  background: var(--color-text);
  color: var(--color-bg);
  padding: var(--space-3) var(--space-5);
  border-radius: var(--radius-lg);
  font-size: var(--text-sm);
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  z-index: 100;
  transform: translateY(16px);
  opacity: 0;
  transition: transform var(--transition), opacity var(--transition);
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ─── Page: Dashboard ───────────────────────────────────────────── */
.dash-period {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--space-6);
  flex-wrap: wrap;
  gap: var(--space-3);
}
.period-nav { display: flex; align-items: center; gap: var(--space-2); }
.period-label {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 700;
  color: var(--color-text);
  min-width: 140px;
  text-align: center;
}

/* ─── Amount Coloring ───────────────────────────────────────────── */
.amount-cell { font-weight: 600; font-variant-numeric: tabular-nums lining-nums; }
.amount-cell.debit { color: var(--color-notification); }

/* ─── Responsive ────────────────────────────────────────────────── */
@media (max-width: 900px) {
  :root { --sidebar-w: 56px; }
}

@media (max-width: 640px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: var(--header-h) 1fr;
  }
  .sidebar { display: none; }
  .header { grid-column: 1; }
  .main {
    grid-column: 1;
    padding: var(--space-4);
    padding-bottom: calc(80px + env(safe-area-inset-bottom));
  }
  .mobile-nav { display: flex; }
  .form-row {
    grid-template-columns: 1fr 1fr;
  }
  .form-row .btn-primary { grid-column: 1 / -1; justify-content: center; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .charts-grid { grid-template-columns: 1fr; }
  .header-title { font-size: var(--text-sm); }
  .sidebar-toggle { display: none; }
}

@media (max-width: 400px) {
  .form-row { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
}

/* ─── Animations ────────────────────────────────────────────────── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.page.active { animation: fadeInUp 200ms ease forwards; }

@keyframes counterUp {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@property --num {
  syntax: '<integer>';
  initial-value: 0;
  inherits: false;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

<script>
/* ─── Categories ─────────────────────────────────────────────── */
const CATEGORIES = [
  { id: 'food',         name: 'Food & Dining',    icon: '🍽️',  color: '#da7101' },
  { id: 'groceries',   name: 'Groceries',         icon: '🛒',  color: '#437a22' },
  { id: 'transport',   name: 'Transport',          icon: '🚗',  color: '#006494' },
  { id: 'fuel',        name: 'Fuel',               icon: '⛽',  color: '#964219' },
  { id: 'utilities',   name: 'Utilities',          icon: '💡',  color: '#7a39bb' },
  { id: 'rent',        name: 'Rent/Housing',       icon: '🏠',  color: '#01696f' },
  { id: 'health',      name: 'Health/Medical',     icon: '🏥',  color: '#a13544' },
  { id: 'shopping',    name: 'Shopping',           icon: '🛍️',  color: '#d19900' },
  { id: 'entertainment', name: 'Entertainment',   icon: '🎬',  color: '#a12c7b' },
  { id: 'subscriptions', name: 'Subscriptions',   icon: '📱',  color: '#006494' },
  { id: 'education',   name: 'Education',          icon: '📚',  color: '#437a22' },
  { id: 'travel',      name: 'Travel',             icon: '✈️',  color: '#da7101' },
  { id: 'savings',     name: 'Investment/EMI',     icon: '💰',  color: '#01696f' },
  { id: 'personal',    name: 'Personal Care',      icon: '💆',  color: '#7a39bb' },
  { id: 'other',       name: 'Others',             icon: '📦',  color: '#7a7974' },
];

const catMap = {};
CATEGORIES.forEach(c => catMap[c.id] = c);

/* ─── State ──────────────────────────────────────────────────── */
let expenses = JSON.parse(localStorage.getItem('ef_expenses') || '[]') || [];
// fallback: in-memory if localStorage blocked
let _memExpenses = [];
function saveExpenses() {
  try { localStorage.setItem('ef_expenses', JSON.stringify(expenses)); } catch(e) { _memExpenses = expenses; }
}

let dashView = 'monthly';
let currentPeriod = { year: new Date().getFullYear(), month: new Date().getMonth(), week: getWeekNum(new Date()) };
let selectedCat = CATEGORIES[0].id;
let modalSelectedCat = CATEGORIES[0].id;
let trendChartInst = null, catChartInst = null, catBreakdownChartInst = null;

function getWeekNum(d) {
  const onejan = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - onejan) / 86400000) + onejan.getDay() + 1) / 7);
}

/* ─── Date helpers ───────────────────────────────────────────── */
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function fmtCurrency(n) {
  return '₹' + Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/* ─── Navigation ─────────────────────────────────────────────── */
const pageTitles = { dashboard: 'Dashboard', add: 'Add Expense', expenses: 'All Expenses', categories: 'Categories' };

function navigateTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item, .mob-nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('headerTitle').textContent = pageTitles[page];

  if (page === 'dashboard') renderDashboard();
  if (page === 'expenses') { populateFilters(); renderExpensesPage(); }
  if (page === 'categories') { populateCatFilters(); renderCategoriesPage(); }
  if (page === 'add') buildPageCatPicker();
}

let sidebarCollapsed = window.innerWidth <= 900 && window.innerWidth > 640;
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('app').classList.toggle('sidebar-collapsed', sidebarCollapsed);
}

window.addEventListener('resize', () => {
  if (window.innerWidth > 640) {
    sidebarCollapsed = window.innerWidth <= 900;
    document.getElementById('app').classList.toggle('sidebar-collapsed', sidebarCollapsed);
  }
});

/* ─── Toast ──────────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ─── Theme Toggle ───────────────────────────────────────────── */
(function(){
  const btn = document.querySelector('[data-theme-toggle]');
  const html = document.documentElement;
  let dark = matchMedia('(prefers-color-scheme:dark)').matches;
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  updateThemeIcon();
  btn.addEventListener('click', () => {
    dark = !dark;
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    updateThemeIcon();
    // re-render charts with new colors
    setTimeout(renderDashboard, 50);
  });
  function updateThemeIcon() {
    btn.innerHTML = dark

/* ─── Add Expense ────────────────────────────────────────────── */
function collectAndAdd(catId, desc, amount, date, note) {
  if (!desc.trim()) { showToast('Please enter a description'); return false; }
  if (!amount || isNaN(amount) || Number(amount) <= 0) { showToast('Please enter a valid amount'); return false; }
  if (!date) { showToast('Please select a date'); return false; }
  expenses.unshift({ id: Date.now(), cat: catId, desc: desc.trim(), amount: Number(amount), date, note: note.trim() });
  saveExpenses();
  return true;
}

function addExpenseFromPage() {
  const desc = document.getElementById('pageDesc').value;
  const amount = document.getElementById('pageAmount').value;
  const date = document.getElementById('pageDate').value;

    document.getElementById('pageNote').value = '';

/* ─── Period Navigation ──────────────────────────────────────── */
function changePeriod(dir) {
  if (dashView === 'monthly') {
    currentPeriod.month += dir;
    if (currentPeriod.month < 0) { currentPeriod.month = 11; currentPeriod.year--; }
    if (currentPeriod.month > 11) { currentPeriod.month = 0; currentPeriod.year++; }
  } else if (dashView === 'yearly') {
    currentPeriod.year += dir;
  } else if (dashView === 'weekly') {
    currentPeriod.week += dir;
    if (currentPeriod.week > 52) { currentPeriod.week = 1; currentPeriod.year++; }
    if (currentPeriod.week < 1) { currentPeriod.week = 52; currentPeriod.year--; }
  }
  renderDashboard();
}

function setDashView(view, btn) {
  dashView = view;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDashboard();
}

function getPeriodLabel() {
  if (dashView === 'monthly') return MONTHS[currentPeriod.month] + ' ' + currentPeriod.year;
  if (dashView === 'yearly')  return String(currentPeriod.year);
  if (dashView === 'weekly')  return `Week ${currentPeriod.week}, ${currentPeriod.year}`;
}

function filterExpensesByPeriod() {
  return expenses.filter(e => {
    const d = new Date(e.date);
    if (dashView === 'monthly') return d.getFullYear() === currentPeriod.year && d.getMonth() === currentPeriod.month;
    if (dashView === 'yearly')  return d.getFullYear() === currentPeriod.year;
    if (dashView === 'weekly')  return d.getFullYear() === currentPeriod.year && getWeekNum(d) === currentPeriod.week;
    return true;
  });
}

function getPrevPeriodExpenses() {
  const prev = { ...currentPeriod };
  if (dashView === 'monthly') { prev.month--; if (prev.month < 0) { prev.month = 11; prev.year--; } }
  if (dashView === 'yearly')  { prev.year--; }
  if (dashView === 'weekly')  { prev.week--; if (prev.week < 1) { prev.week = 52; prev.year--; } }
  return expenses.filter(e => {
    const d = new Date(e.date);
    if (dashView === 'monthly') return d.getFullYear() === prev.year && d.getMonth() === prev.month;
    if (dashView === 'yearly')  return d.getFullYear() === prev.year;
    if (dashView === 'weekly')  return d.getFullYear() === prev.year && getWeekNum(d) === prev.week;
    return true;
  });
}

/* ─── Render Dashboard ───────────────────────────────────────── */
function renderDashboard() {
  document.getElementById('periodLabel').textContent = getPeriodLabel();

  const filtered = filterExpensesByPeriod();
  const prev = getPrevPeriodExpenses();

  const total = filtered.reduce((s, e) => s + e.amount, 0);
  const prevTotal = prev.reduce((s, e) => s + e.amount, 0);
  const delta = prevTotal > 0 ? ((total - prevTotal) / prevTotal * 100).toFixed(1) : null;
  const topCat = (() => {
    const agg = {};
    filtered.forEach(e => agg[e.cat] = (agg[e.cat] || 0) + e.amount);
    const top = Object.entries(agg).sort((a,b) => b[1]-a[1])[0];
    return top ? catMap[top[0]] : null;
  })();

  // KPI
  const kpiGrid = document.getElementById('kpiGrid');
  const deltaHtml = delta !== null
    ? `<div class="kpi-delta ${delta > 0 ? 'up' : 'down'}">
        ${delta > 0 ? '↑' : '↓'} ${Math.abs(delta)}% vs prev
       </div>`
    : `<div class="kpi-sub">No previous data</div>`;

  kpiGrid.innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Total Spent</div>
      <div class="kpi-value">${fmtCurrency(total)}</div>
      ${deltaHtml}
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Transactions</div>
      <div class="kpi-value">${filtered.length}</div>
      <div class="kpi-sub">${dashView} count</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg per Transaction</div>
      <div class="kpi-value">${fmtCurrency(filtered.length ? total/filtered.length : 0)}</div>
      <div class="kpi-sub">per entry</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Top Category</div>
      <div class="kpi-value" style="font-size:var(--text-lg)">${topCat ? topCat.icon + ' ' + topCat.name.split('/')[0] : '—'}</div>
      <div class="kpi-sub">${topCat ? fmtCurrency((filtered.filter(e=>e.cat===topCat.id).reduce((s,e)=>s+e.amount,0))) : 'No data'}</div>
    </div>`;

  // Trend chart
  renderTrendChart(filtered);
  // Cat chart
  renderCatChart(filtered);
  // Recent table
  renderRecentTable(filtered.slice(0, 8));
}

function getCSSVar(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

function renderTrendChart(filtered) {
  const ctx = document.getElementById('trendChart').getContext('2d');
  if (trendChartInst) trendChartInst.destroy();

  let labels = [], data = [];
  if (dashView === 'monthly') {
    // days in month
    const daysInMonth = new Date(currentPeriod.year, currentPeriod.month + 1, 0).getDate();
    labels = Array.from({length: daysInMonth}, (_, i) => String(i+1));
    data = Array(daysInMonth).fill(0);
    filtered.forEach(e => { const day = new Date(e.date).getDate() - 1; data[day] += e.amount; });
  } else if (dashView === 'weekly') {
    labels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    data = Array(7).fill(0);
    filtered.forEach(e => {
      const d = new Date(e.date);
      const dow = (d.getDay() + 6) % 7;
      data[dow] += e.amount;
    });
  } else {
    labels = MONTHS_SHORT;
    data = Array(12).fill(0);
    filtered.forEach(e => { const m = new Date(e.date).getMonth(); data[m] += e.amount; });
  }

  const primary = getCSSVar('--color-primary') || '#01696f';
  const textMuted = getCSSVar('--color-text-muted') || '#7a7974';
  const border = getCSSVar('--color-border') || '#d4d1ca';

  trendChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: primary + '30',
        borderColor: primary,
        borderWidth: 1.5,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => fmtCurrency(ctx.raw) }
      }},
      scales: {
        x: { grid: { color: border + '50' }, ticks: { color: textMuted, font: { size: 11 }, maxRotation: 0,
          callback: function(val, i) {
            if (dashView === 'monthly' && labels.length > 15) return (i+1) % 5 === 0 ? labels[i] : '';
            return labels[i];
          }
        }},
        y: { grid: { color: border + '50' }, ticks: { color: textMuted, font: { size: 11 },
          callback: v => '₹' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : v)
        }, beginAtZero: true }
      }
    }
  });
}

function renderCatChart(filtered) {
  const ctx = document.getElementById('catChart').getContext('2d');
  if (catChartInst) catChartInst.destroy();

  const agg = {};
  filtered.forEach(e => agg[e.cat] = (agg[e.cat] || 0) + e.amount);
  const sorted = Object.entries(agg).sort((a,b) => b[1]-a[1]).slice(0, 8);

  if (!sorted.length) {
    catChartInst = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: [1], backgroundColor: ['#e0e0e0'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }});
    return;
  }

  const labels = sorted.map(([id]) => catMap[id]?.name || id);
  const data = sorted.map(([,v]) => v);
  const colors = sorted.map(([id]) => catMap[id]?.color || '#888');
  const textMuted = getCSSVar('--color-text-muted') || '#7a7974';

  catChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors.map(c => c + 'cc'), borderColor: colors, borderWidth: 1.5 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: textMuted, font: { size: 11 }, padding: 8, boxWidth: 10 }},
        tooltip: { callbacks: { label: ctx => ' ' + ctx.label + ': ' + fmtCurrency(ctx.raw) }}
      },
      cutout: '65%',
    }
  });
}

/* ─── Export CSV ─────────────────────────────────────────────── */
function downloadCSV() {
  const month = document.getElementById('filterMonth').value;
  const year = document.getElementById('filterYear').value;
  const cat = document.getElementById('filterCat').value;

  const filtered = expenses.filter(e => {
    const d = new Date(e.date);
    if (year && d.getFullYear() !== Number(year)) return false;
    if (month !== '' && d.getMonth() !== Number(month)) return false;
    if (cat && e.cat !== cat) return false;
    return true;
  });

  const rows = [['Date', 'Description', 'Category', 'Amount (INR)', 'Note']];
  filtered.forEach(e => {
    rows.push([e.date, '"' + e.desc.replace(/"/g, '""') + '"', catMap[e.cat]?.name || e.cat, e.amount.toFixed(2), '"' + (e.note||'').replace(/"/g, '""') + '"']);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'expenses.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV downloaded!');
}

/* ─── Escape HTML ────────────────────────────────────────────── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
